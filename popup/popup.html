<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GRAMPTIOUS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000;--dark1:#080600;--dark2:#100D05;--dark3:#181200;
  --gold:#FFD700;--gold2:#B8860B;--gold3:#DAA520;--goldfaint:rgba(255,215,0,0.07);
  --red:#DC143C;--red2:#8B0000;--redfaint:rgba(220,20,60,0.07);
  --pink:#FF1493;--text:#F0E6D0;--dim:#6B5530;
  --glass:rgba(255,215,0,0.05);--glass-border:rgba(255,215,0,0.15);
  --font:'Calibri','Candara','Segoe UI',sans-serif;
}
body{
  width:320px;background:var(--black);color:var(--text);
  font-family:var(--font);font-size:14px;overflow:hidden;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(255,215,0,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(220,20,60,0.06) 0%,transparent 60%);
}
/* Header */
.hdr{
  padding:16px 16px 12px;
  border-bottom:1px solid rgba(255,215,0,0.1);
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-gem{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border-radius:6px;font-size:18px;color:#000;font-weight:900;
  box-shadow:0 0 16px rgba(255,215,0,0.4),inset 0 1px 0 rgba(255,255,255,0.3);
}
.logo-text{flex:1;}
.logo-name{font-size:18px;font-weight:700;letter-spacing:.12em;
  background:linear-gradient(135deg,var(--gold),#FFF8DC,var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:.1em;margin-top:1px;}
.version-badge{
  font-size:9px;padding:2px 7px;border-radius:99px;
  border:1px solid rgba(255,215,0,0.25);color:var(--gold2);
  font-family:monospace;
}
/* Account card */
.account-card{
  margin:12px;padding:12px 14px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:10px;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,215,0,0.08);
  position:relative;overflow:hidden;
}
.account-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent);
}
.conn-label{font-size:9px;letter-spacing:.1em;color:var(--dim);margin-bottom:8px;font-family:monospace;}
.account-row{display:flex;align-items:center;gap:10px;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar{
  width:42px;height:42px;border-radius:50%;object-fit:cover;
  border:2px solid var(--gold2);
  box-shadow:0 0 12px rgba(255,215,0,0.3);
  background:var(--dark2);
}
.avatar-ring{
  position:absolute;inset:-3px;border-radius:50%;
  border:1px solid rgba(255,215,0,0.3);
  animation:ring-pulse 2s ease-in-out infinite;
}
@keyframes ring-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.2;transform:scale(1.05)}}
.account-info{flex:1;min-width:0;}
.account-name{font-size:14px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.account-handle{font-size:11px;color:var(--dim);font-family:monospace;}
.conn-badge{
  font-size:9px;padding:3px 8px;border-radius:3px;
  border:1px solid rgba(255,215,0,0.4);color:var(--gold);
  background:rgba(255,215,0,0.06);font-family:monospace;letter-spacing:.04em;
  flex-shrink:0;
}
/* Stats row */
.stats-row{display:flex;gap:6px;margin:0 12px 10px;}
.stat-mini{
  flex:1;padding:8px 6px;text-align:center;
  background:var(--glass);border:1px solid rgba(255,215,0,0.08);
  border-radius:8px;
}
.stat-mini-n{font-size:18px;font-weight:700;color:var(--gold);font-family:monospace;line-height:1;}
.stat-mini-n.red{color:var(--red);}
.stat-mini-l{font-size:9px;color:var(--dim);letter-spacing:.06em;margin-top:2px;}
/* Open button */
.open-btn{
  margin:0 12px 10px;width:calc(100% - 24px);
  padding:13px;border:none;border-radius:10px;cursor:pointer;
  font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.14em;
  color:#000;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 40%,#FFF8DC 60%,var(--gold3) 100%);
  box-shadow:0 4px 20px rgba(255,215,0,0.3),0 1px 0 rgba(255,255,255,0.2) inset;
  transition:all .2s;
}
.open-btn:hover{box-shadow:0 6px 28px rgba(255,215,0,0.5);transform:translateY(-1px);}
.open-btn:active{transform:translateY(0);box-shadow:0 2px 10px rgba(255,215,0,0.3);}
.open-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.open-btn:hover::after{transform:translateX(100%);}
/* Go to IG button */
.goto-btn{
  margin:0 12px 10px;width:calc(100% - 24px);padding:11px;
  border:1px solid rgba(255,215,0,0.3);border-radius:10px;cursor:pointer;
  background:transparent;color:var(--gold2);
  font-family:var(--font);font-size:13px;font-weight:600;letter-spacing:.1em;
  transition:all .15s;
}
.goto-btn:hover{background:rgba(255,215,0,0.06);border-color:var(--gold);}
/* Not-on-IG view */
.not-ig{padding:24px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.not-ig-icon{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  background:rgba(220,20,60,0.1);border:1px solid rgba(220,20,60,0.3);
  box-shadow:0 0 20px rgba(220,20,60,0.2);
}
.not-ig-msg{font-size:12px;color:var(--dim);line-height:1.7;max-width:220px;}
.not-ig-msg strong{color:var(--gold);}
/* Footer */
.footer{
  padding:8px 16px;border-top:1px solid rgba(255,215,0,0.07);
  display:flex;align-items:center;gap:6px;
}
.foot-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.foot-dot.live{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.foot-text{font-size:9px;color:var(--dim);font-family:monospace;letter-spacing:.05em;}
[hidden]{display:none!important;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo-row">
    <div class="logo-gem">G</div>
    <div class="logo-text">
      <div class="logo-name">GRAMPTIOUS</div>
      <div class="logo-sub">INSTAGRAM INTELLIGENCE SUITE</div>
    </div>
    <div class="version-badge">v3.0</div>
  </div>
</div>

<div id="viewNotIG" class="not-ig">
  <div class="not-ig-icon">⚠</div>
  <div class="not-ig-msg">Open <strong>instagram.com</strong> in this browser, log in, then click the extension again.</div>
  <button class="goto-btn" id="btnGoIG">OPEN INSTAGRAM</button>
</div>

<div id="viewConnected" hidden>
  <div class="account-card">
    <div class="conn-label">// CONNECTED ACCOUNT</div>
    <div class="account-row">
      <div class="avatar-wrap">
        <img class="avatar" id="avatar" src="" alt=""/>
        <div class="avatar-ring"></div>
      </div>
      <div class="account-info">
        <div class="account-name" id="accountName">—</div>
        <div class="account-handle" id="accountHandle">@—</div>
      </div>
      <div class="conn-badge" id="connBadge">● FREE</div>
    </div>
  </div>

  <div class="stats-row" id="statsRow" hidden>
    <div class="stat-mini">
      <div class="stat-mini-n" id="stFol">—</div>
      <div class="stat-mini-l">FOLLOWING</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-n" id="stFer">—</div>
      <div class="stat-mini-l">FOLLOWERS</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-n red" id="stNF">—</div>
      <div class="stat-mini-l">NOT BACK</div>
    </div>
  </div>

  <button class="open-btn" id="btnOpenDash">⬡ &nbsp;OPEN ANALYSER</button>
</div>

<div class="footer">
  <div class="foot-dot" id="footDot"></div>
  <span class="foot-text" id="footText">CHECKING SESSION...</span>
</div>
<script src="popup.js"></script>
</body>
</html>
